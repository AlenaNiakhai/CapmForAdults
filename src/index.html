<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREVER YOUNG · Лагерь для взрослых</title>
    <!-- Подключаем CSS отдельно (стили внутри тега style для целостности ответа, но это чистый CSS) -->
    <style>
        /* ========== CSS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(270deg, #f9e3b3, #ffccbc, #d9b8e0, #b5d9f7);
            background-size: 400% 400%;
            animation: gradientFlow 16s ease infinite;
            padding: 2rem 1rem;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .page-wrapper {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.25);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* типографика */
        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .overline {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            font-weight: 500;
        }

        /* header */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .logo-block {
            display: flex;
            align-items: baseline;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(130deg, #2c3e50, #4a2f5c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 10px rgba(255,215,245,0.5);
        }

        .badge {
            background: #f9f3e7;
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid white;
        }

        .phone {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e2a36;
            text-decoration: none;
            border-bottom: 2px dotted #a378b4;
        }

        /* hero */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: 4rem 0 3rem;
        }

        .hero h2 {
            font-size: 3.2rem;
            max-width: 800px;
            line-height: 1.1;
            margin-bottom: 0.8rem;
            color: #1e2a36;
        }

        .hero p {
            font-size: 1.3rem;
            color: #2a3b4e;
            background: rgba(255,255,240,0.6);
            padding: 0.6rem 2rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }

        .btn-primary {
            background: #212121;
            color: white;
            border: none;
            padding: 1.2rem 3.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 60px;
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.3s, box-shadow 0.2s;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: scale(1.03) rotate(0.5deg);
            filter: brightness(1.1);
            box-shadow: 0 20px 30px -8px #1e2a36;
        }

        /* секции */
        .section {
            margin: 5rem 0;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            display: inline-block;
            border-left: 12px solid #ab7bc9;
            padding-left: 1.5rem;
        }

        /* о проекте (текст + img) */
        .about-grid {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .about-text {
            flex: 2;
            min-width: 280px;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #1f2a36;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 2rem;
            backdrop-filter: blur(5px);
        }

        .about-img {
            flex: 1;
            min-width: 240px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, filter 0.3s;
            background: #f2e6fa;
        }

        .about-img:hover {
            transform: scale(1.05) rotate(1deg);
            filter: brightness(1.05);
        }

        .about-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* преимущества (цифры) */
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .benefit-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 2rem 1rem;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 8px 18px -6px rgba(80, 60, 120, 0.2);
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .benefit-card:hover {
            transform: translateY(-8px) scale(1.02);
            filter: brightness(1.1);
            background: rgba(255, 245, 250, 0.9);
            box-shadow: 0 20px 25px -8px #9f7bb3;
        }

        .benefit-stat {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1;
            color: #311847;
            margin-bottom: 0.5rem;
        }

        .benefit-desc {
            font-size: 1rem;
            font-weight: 500;
            color: #1e2a36;
        }

        /* why cards */
        .reasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .reason-item {
            background: rgba(250, 245, 255, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.2s;
        }

        .reason-item:hover {
            transform: scale(1.02) rotate(0.3deg);
            filter: brightness(1.08);
            background: rgba(255, 240, 250, 0.8);
        }

        .reason-item p {
            font-size: 1.25rem;
            font-weight: 500;
        }

        /* день программы */
        .day-card {
            background: linear-gradient(135deg, #fff6e9, #faf0fe);
            border-radius: 48px;
            padding: 2rem 2.5rem;
            margin: 2rem 0;
            box-shadow: 0 12px 28px -12px rgba(0,0,0,0.2);
            transition: all 0.25s;
            border: 1px solid rgba(255,255,255,0.9);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2rem;
        }

        .day-card:hover {
            transform: scale(1.01) translateY(-4px);
            filter: brightness(1.04);
            background: #fffaf5;
        }

        .day-info {
            flex: 2;
            min-width: 200px;
        }

        .day-info h3 {
            font-size: 3rem;
            color: #311b46;
            margin-bottom: 0.5rem;
        }

        .day-time {
            font-size: 2rem;
            font-weight: 300;
            color: #b45f9b;
            margin: 0.5rem 0;
        }

        .day-desc {
            font-size: 1.2rem;
        }

        .day-img {
            flex: 1;
            border-radius: 32px;
            overflow: hidden;
            min-width: 180px;
            max-width: 280px;
            transition: 0.3s;
        }

        .day-img:hover {
            transform: scale(1.08) rotate(1deg);
            filter: brightness(1.1);
        }

        .day-img img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* имиджи — все с alt, места под заливку */
        .placeholder-img {
            background: #ddc7f0;
            min-height: 180px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #59468a;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            padding: 1rem;
            border-radius: inherit;
            background-image: radial-gradient(circle at 20px 20px, #ecd9ff 2px, transparent 2px), 
                              radial-gradient(circle at 80px 40px, #ecd9ff 3px, transparent 3px);
            background-size: 50px 50px, 100px 100px;
        }

        /* подвал */
        .footer-note {
            margin-top: 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-top: 2px dashed #ab7bc9;
            padding-top: 2rem;
            color: #1e2a36;
            font-weight: 500;
        }

        /* мобильность */
        @media (max-width: 600px) {
            .page-wrapper { padding: 1.5rem; }
            .hero h2 { font-size: 2.4rem; }
            .btn-primary { font-size: 1.2rem; padding: 1rem 2rem; }
        }
